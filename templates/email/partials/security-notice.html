<!--
  Security / support footer block — variables:
  {{expiry_minutes}}, {{support_email}}
-->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
  <tr>
    <td style="font-family:Inter,Arial,Helvetica,sans-serif;font-size:16px;line-height:24px;color:#4D4B4B;">
      <p style="margin:0 0 12px 0;">This code will expire in {{expiry_minutes}} minutes.</p>
      <p style="margin:0 0 12px 0;">Do not share this code with anyone. We will never ask for this outside this email.</p>
      <p style="margin:0;">
        Didn&apos;t request this? Ignore this mail or contact us
        <a href="mailto:{{support_email}}" style="color:#DD4F05;text-decoration:underline;">{{support_email}}</a>.
      </p>
    </td>
  </tr>
</table>
