<!--
  Header with logo — variables:
  {{app_url}}/email/logo.png — served from public/email/
  {{company_name}} — alt text, e.g. "SohCahToa Holdings"
-->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#FFFFFF;border-bottom:1px solid #F2F4F7;">
  <tr>
    <td align="left" style="padding:22px 28px;">
      <a href="{{app_url}}" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">
        <img src="{{app_url}}/email/logo.png" width="134" height="67" alt="{{company_name}}" style="display:block;width:134px;max-width:134px;height:auto;border:0;" />
      </a>
    </td>
  </tr>
</table>
